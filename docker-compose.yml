    services:
      db:
        container_name: examPortal
        image: postgres:latest
        environment:
          POSTGRES_DB: onlineExamPortal
          POSTGRES_USER: sid
          POSTGRES_PASSWORD: "2371"
          PGDATA: /data/postgres
        volumes:
          - db:/data/postgres
        ports:
          - "5000:5432"            #changed the port
        networks:
          - db
        restart: unless-stopped

    networks:
      db:
        driver: bridge

    volumes:
      db: